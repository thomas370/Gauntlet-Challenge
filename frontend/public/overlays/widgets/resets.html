<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Resets</title>
<link rel="stylesheet" href="/overlays/css/shared.css">
</head>
<body>
  <div class="card accent-red">
    <div class="card-header">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="1 4 1 10 7 10"/>
        <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
      </svg>
      <span>Resets</span>
    </div>
    <div class="value red" id="value">0</div>
  </div>

<script src="/overlays/js/client.js"></script>
<script>
  const el = document.getElementById('value');
  window.Overlay.subscribe(s => { el.textContent = s.resets; });
</script>
</body>
</html>
