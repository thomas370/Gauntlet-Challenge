<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Liste des jeux</title>
<link rel="stylesheet" href="/overlays/css/shared.css">
<style>
  body { padding: 14px; }

  .list-container {
    max-width: 360px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .game-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: linear-gradient(135deg, #1b1c25 0%, #14151c 100%);
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.04);
    transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    position: relative;
  }

  /* Pop + green flash when a game transitions into the completed state. */
  @keyframes completedPop {
    0%   { transform: scale(1);    box-shadow: 0 0 0 rgba(34, 197, 94, 0); }
    35%  { transform: scale(1.04); box-shadow: 0 0 22px rgba(34, 197, 94, 0.55); }
    100% { transform: scale(1);    box-shadow: 0 0 0 rgba(34, 197, 94, 0); }
  }
  @keyframes badgePop {
    0%   { transform: scale(0.5) rotate(-12deg); }
    55%  { transform: scale(1.2) rotate(0deg); }
    100% { transform: scale(1)   rotate(0deg); }
  }
  .game-row.just-completed {
    animation: completedPop 0.7s ease-out;
  }
  .game-row.just-completed .badge {
    animation: badgePop 0.55s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .game-row.completed {
    background: linear-gradient(135deg, #14532d 0%, #0d3a20 100%);
    border-color: rgba(34, 197, 94, 0.35);
  }

  .game-row.current {
    background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%);
    border-color: rgba(96, 165, 250, 0.55);
    box-shadow: 0 0 14px rgba(59, 130, 246, 0.35);
  }

  .badge {
    flex-shrink: 0;
    width: 30px; height: 30px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,0.06);
    font-size: 13px;
    font-weight: 700;
    color: rgba(255,255,255,0.85);
  }
  .game-row.completed .badge {
    background: #22c55e;
    color: #052e14;
  }
  .game-row.current .badge {
    background: #3b82f6;
    color: #fff;
    box-shadow: 0 0 10px rgba(59, 130, 246, 0.6);
  }
  .badge svg { width: 16px; height: 16px; }

  .info {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .row-name {
    font-size: 14px;
    font-weight: 700;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .row-player {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    color: rgba(255,255,255,0.65);
  }
  .row-player svg { width: 11px; height: 11px; }
  .row-time {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    color: rgba(255,255,255,0.65);
    font-family: 'Consolas', monospace;
    margin-top: 2px;
  }
  .row-time svg { width: 11px; height: 11px; }

  .game-row.current .row-time {
    background: #000;
    color: #fbbf24;
    align-self: flex-start;
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 1px;
  }

  .live-indicator {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #60a5fa;
    box-shadow: 0 0 8px #60a5fa;
    animation: pulse 1.4s ease-in-out infinite;
    flex-shrink: 0;
  }
</style>
</head>
<body>
  <div class="list-container" id="list"></div>

<script src="/overlays/js/time.js"></script>
<script src="/overlays/js/client.js"></script>
<script>
  const list = document.getElementById('list');
  let lastState = null;

  const userIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`;
  const clockIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/></svg>`;
  const checkIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
  const padIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="11" x2="10" y2="11"/><line x1="8" y1="9" x2="8" y2="13"/><line x1="15" y1="12" x2="15.01" y2="12"/><line x1="18" y1="10" x2="18.01" y2="10"/><path d="M17.32 5H6.68a4 4 0 0 0-3.978 3.59c-.006.052-.01.101-.017.152C2.604 9.416 2 14.456 2 16a3 3 0 0 0 3 3c1 0 1.5-.5 2-1l1.414-1.414A2 2 0 0 1 9.828 16h4.344a2 2 0 0 1 1.414.586L17 18c.5.5 1 1 2 1a3 3 0 0 0 3-3c0-1.545-.604-6.584-.685-7.258A4 4 0 0 0 17.32 5z"/></svg>`;

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // null on first render → don't animate the initial snapshot (otherwise every
  // already-completed game would flash at once when OBS reconnects).
  let prevDoneIds = null;

  function render(s) {
    lastState = s;
    const nowDoneIds = new Set(
      s.games.filter(g => g.status === 'completed').map(g => g.id)
    );
    const newlyCompleted = prevDoneIds === null
      ? []
      : [...nowDoneIds].filter(id => !prevDoneIds.has(id));

    list.innerHTML = s.games.map((g, i) => {
      const num = i + 1;
      let badgeContent = num;
      if (g.status === 'completed') badgeContent = checkIcon;
      else if (g.status === 'current') badgeContent = padIcon;

      let timeBlock = '';
      if (g.status === 'completed') {
        timeBlock = `<div class="row-time">${clockIcon}<span>${fmtMS(g.duration)}</span></div>`;
      } else if (g.status === 'current') {
        timeBlock = `<div class="row-time" data-current="1">${fmtHMS(liveCurrentMs(s))}</div>`;
      }

      const liveDot = g.status === 'current' ? '<div class="live-indicator"></div>' : '';

      return `
        <div class="game-row ${g.status}" data-id="${g.id}">
          <div class="badge">${badgeContent}</div>
          <div class="info">
            <div class="row-name">${escapeHtml(g.name)}</div>
            <div class="row-player">${userIcon}<span>${escapeHtml(g.player)}</span></div>
            ${timeBlock}
          </div>
          ${liveDot}
        </div>
      `;
    }).join('');

    for (const id of newlyCompleted) {
      const el = list.querySelector(`.game-row[data-id="${id}"]`);
      if (el) el.classList.add('just-completed');
    }
    prevDoneIds = nowDoneIds;
  }

  function tick() {
    if (!lastState) return;
    const el = list.querySelector('.row-time[data-current]');
    if (el) el.textContent = fmtHMS(liveCurrentMs(lastState));
  }

  window.Overlay.subscribe(render);
  setInterval(tick, 1000);
</script>
</body>
</html>
