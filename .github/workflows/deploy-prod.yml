name: Deploy PROD
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /home/bortolato/www/Gauntlet-Challenge
            git fetch origin main
            git reset --hard origin/main
            npm ci
            npm --workspace frontend run build
            # Restart backend so backend code changes take effect.
            # Replace with your actual process manager command, e.g.:
            # pm2 restart gauntlet-backend
            # sudo systemctl restart gauntlet-backend
